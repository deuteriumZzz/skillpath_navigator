services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-skillpath_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5
    profiles: [neo4j]
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      USE_REDIS_CACHE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - static_files:/app/staticfiles

  celery_worker:
    build: ./backend
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      USE_REDIS_CACHE: "true"
      GRAPH_BACKEND: ${GRAPH_BACKEND:-memory}
    command: celery -A config worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  flower:
    build: ./backend
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/2
    command: >
      celery -A config flower --port=5555
      --basic-auth=${FLOWER_USER:-flower}:${FLOWER_PASSWORD:-changeme}
      --url-prefix=flower
    expose:
      - "5555"
    depends_on:
      - redis
      - celery_worker

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - static_files:/django_static:ro

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  static_files:
