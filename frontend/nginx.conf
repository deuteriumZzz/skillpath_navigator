upstream django {
    server backend:8000;
}

upstream flower {
    server flower:5555;
}

upstream grafana {
    server grafana:3000;
}

server {
    listen 80;
    server_name _;

    # React SPA — все неизвестные маршруты отдают index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Django REST API
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL
    location /graphql/ {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # OpenAPI docs
    location /api/schema/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
    }
    location /api/docs/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
    }

    # WebSocket (Django Channels)
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400s;
    }

    # Django static files served directly from shared volume (no proxy overhead)
    location /static/ {
        alias /django_static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Grafana dashboard
    location /grafana/ {
        proxy_pass http://grafana/grafana/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana WebSocket (live panels)
    location /grafana/api/live/ {
        proxy_pass http://grafana/grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }

    # Flower — Celery dashboard (auth handled by Flower itself via --basic-auth)
    location /flower/ {
        proxy_pass http://flower/flower/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Prometheus metrics — only accessible from within Docker network
    location /metrics {
        proxy_pass http://django;
        proxy_set_header Host $host;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
