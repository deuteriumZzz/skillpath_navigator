name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run tests
        working-directory: backend
        env:
          DB_NAME: ""
          USE_REDIS_CACHE: "false"
          GRAPH_BACKEND: memory
          DJANGO_SETTINGS_MODULE: config.settings
        run: python manage.py test tests --verbosity=2

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install black==23.12.1 isort==5.13.2 flake8==7.0.0

      - name: black
        run: black --check backend/

      - name: isort
        run: isort --check-only --profile black backend/

      - name: flake8
        run: flake8 backend/ --max-line-length=119 --exclude=migrations,venv
